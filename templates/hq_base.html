<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDS — {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="hq-body">
    <header class="hq-spa-header">
        <div class="hq-zone1">
            <div class="hq-z1-top" style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;width:100%;">
                <div style="display:flex;justify-content:flex-start;align-items:center;">
                    <div class="hq-nav-box hq-nav-box-lime" style="display:inline-flex;align-items:center;gap:10px;padding:0 16px;height:34px;width:auto;white-space:nowrap;flex-shrink:0;">
                        <a href="/hq/" class="hq-portal-link hq-current">HQ</a>
                        <span class="hq-pipe">|</span>
                        <a href="/hq/goto-studio" class="hq-portal-link">STUDIO</a>
                        <span class="hq-pipe">|</span>
                        <a href="/hq/logout" class="hq-portal-link">LOGOUT</a>
                    </div>
                </div>
                <div style="text-align:center;white-space:nowrap;">
                    <a href="/hq/" class="hq-logo-link">STUDS</a>
                    <div class="hq-confidential-sub">(CONFIDENTIAL)</div>
                </div>
                <div style="display:flex;justify-content:flex-end;align-items:center;">
                    <div class="hq-nav-box hq-nav-box-lavender" style="display:inline-flex;align-items:center;gap:10px;padding:0 16px;height:34px;width:auto;white-space:nowrap;flex-shrink:0;">
                        {% block right_nav %}{% endblock %}
                    </div>
                </div>
            </div>
            <div class="hq-z1-bottom">
                <div class="hq-z1-bottom-left">
                    {% if current_user_name %}<span class="hq-user-name">{{ current_user_name }}</span>{% endif %}
                </div>
                <div class="hq-z1-bottom-right">
                    <span class="hq-timestamp"><strong>UPDATED:</strong> {{ last_loaded_global }}</span>
                </div>
            </div>
        </div>
        <hr class="hq-header-rule">
        {% block section_nav %}{% endblock %}
    </header>

    <div class="hq-page-content">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
